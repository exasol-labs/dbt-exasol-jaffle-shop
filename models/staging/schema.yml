version: 2

models:
  - name: stg_customers
    description: Cleaned customer data from the raw seed, one row per customer.
    columns:
      - name: customer_id
        description: Primary key, unique identifier for each customer.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: Customer's first name.
      - name: last_name
        description: Customer's last name.

  - name: stg_orders
    description: Cleaned order data from the raw seed, one row per order.
    columns:
      - name: order_id
        description: Primary key, unique identifier for each order.
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: Foreign key to stg_customers.
      - name: order_date
        description: Date the order was placed.
      - name: status
        description: Current status of the order.
        data_tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']

  - name: stg_payments
    description: Cleaned payment data from the raw seed, one row per payment. Amount converted from cents to dollars.
    columns:
      - name: payment_id
        description: Primary key, unique identifier for each payment.
        data_tests:
          - unique
          - not_null
      - name: order_id
        description: Foreign key to stg_orders.
      - name: payment_method
        description: Method used for payment.
        data_tests:
          - accepted_values:
              arguments:
                values: ['credit_card', 'coupon', 'bank_transfer', 'gift_card']
      - name: amount
        description: Payment amount in dollars (converted from cents in raw data).
